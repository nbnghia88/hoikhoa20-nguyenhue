<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hội khóa 20 năm – Chuyên Nguyễn Huệ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#0A1628;--dblue:#132240;--gold:#C9A84C;--goldbg:#E8D5A0;--green:#27ae60;--red:#e74c3c;--orange:#f39c12;--gray:#95a5a6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--navy);color:#fff;min-height:100vh}
.ct{max-width:920px;margin:0 auto;padding:16px}
.hd{text-align:center;padding:24px 0 14px;border-bottom:1px solid rgba(201,168,76,.2)}
.hd .tg{color:var(--gold);font-size:11px;letter-spacing:3px;text-transform:uppercase}
.hd h1{font-size:22px;font-weight:900;background:linear-gradient(135deg,#C9A84C,#E8D5A0,#C9A84C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:6px 0}
.hd .sb{color:var(--goldbg);font-size:11px;opacity:.7}
.cd{display:flex;justify-content:center;gap:10px;margin:18px 0;flex-wrap:wrap}
.cb{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.22);border-radius:12px;padding:12px 18px;text-align:center;min-width:68px}
.cb .n{font-size:30px;font-weight:800;color:var(--gold);font-family:'Be Vietnam Pro',monospace;line-height:1}
.cb .l{font-size:9px;color:var(--goldbg);letter-spacing:2px;margin-top:4px}
.sts{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:8px;margin:16px 0}
.st{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 10px;text-align:center;transition:transform .2s}
.st:hover{transform:translateY(-2px)}
.st .v{font-size:22px;font-weight:800;font-family:'Be Vietnam Pro',monospace;color:var(--gold);word-break:break-word}
.st .lb{font-size:10px;color:rgba(255,255,255,.45);margin-top:3px}
.gg{background:rgba(255,255,255,.08);border-radius:10px;height:24px;overflow:hidden;margin:12px 0;border:1px solid rgba(201,168,76,.15)}
.gf{height:100%;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--navy);transition:width .8s ease;min-width:32px}
.lks{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap}
.lks a,.ip{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;text-decoration:none;font-size:12px;font-weight:600;transition:opacity .2s}
.lks a:hover{opacity:.85}
.lk-fb{background:#4267B2;color:#fff}.lk-dr{background:#0F9D58;color:#fff}.lk-fm{background:var(--gold);color:var(--navy)}
.ip{background:rgba(255,255,255,.06);color:var(--goldbg);font-weight:500}
.bk{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.18);border-radius:14px;padding:18px;margin:14px 0}
.bk-t{color:var(--gold);font-weight:700;font-size:15px;margin-bottom:12px}
.bk-r{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.bk-l{color:var(--goldbg);font-size:12px;flex-shrink:0}.bk-v{color:#fff;font-size:12px;font-weight:500;text-align:right}
.bk-n{font-family:'Be Vietnam Pro',monospace;font-size:15px;font-weight:800;color:var(--gold);letter-spacing:1px}
.bk-empty{color:rgba(255,255,255,.3);font-style:italic;font-weight:400}
.bg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin:12px 0}
.bc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px}
.bc-r{color:var(--gold);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.bc-n{color:#fff;font-size:15px;font-weight:700;margin:5px 0 3px}
.bc-n-empty{color:rgba(255,255,255,.3);font-size:13px;font-style:italic;margin:5px 0 3px}
.bc-i{color:var(--goldbg);font-size:11px;margin:2px 0}
.sc{margin:22px 0 10px}.sc h2{color:var(--gold);font-size:16px;font-weight:700;margin-bottom:8px}
.tabs{display:flex;overflow-x:auto;gap:4px;background:var(--dblue);padding:5px 8px;border-radius:10px;margin:14px 0}
.tab{padding:9px 16px;border:none;cursor:pointer;background:transparent;color:rgba(255,255,255,.4);font-size:12px;font-weight:500;white-space:nowrap;border-radius:7px;font-family:inherit;transition:all .2s}
.tab:hover{color:rgba(255,255,255,.7)}
.tab.active{background:rgba(201,168,76,.15);color:var(--gold);font-weight:700}
.tc{display:none}.tc.active{display:block}
.tb{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.tb th{background:var(--dblue);color:#fff;padding:9px 10px;text-align:left;font-weight:600;font-size:11px}
.tb td{padding:7px 10px;color:#333;border-bottom:1px solid #f0f0ed}
.tb tr:hover{background:#fafaf5}
.grp{background:var(--goldbg)!important;font-weight:700;color:var(--navy)!important}
.badge{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:600;color:#fff}
.b-xong{background:var(--green)}.b-dang{background:var(--orange)}.b-tre{background:var(--red)}.b-chua{background:var(--gray)}
.ft{text-align:center;padding:18px 0;border-top:1px solid rgba(201,168,76,.12);margin-top:24px}
.ft .t1{color:var(--gold);font-size:12px}.ft .t2{color:rgba(255,255,255,.25);font-size:10px;margin-top:4px}
.refresh{color:var(--goldbg);font-size:10px;text-align:center;margin:10px 0;opacity:.5}
.loading{text-align:center;padding:40px;color:var(--gold)}
.loading .spin{display:inline-block;width:28px;height:28px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.err{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2);border-radius:10px;padding:16px;margin:12px 0;color:#e74c3c;font-size:12px;line-height:1.6}
@media(max-width:600px){.sts{grid-template-columns:repeat(2,1fr)}.cb .n{font-size:24px}.bg{grid-template-columns:1fr}.bk{padding:14px}.st .v{font-size:18px}}
</style>
</head>
<body>

<div class="ct">
  <div class="hd">
    <div class="tg">Thanh Xuân Vẫy Gọi</div>
    <h1>HỘI KHÓA 20 NĂM – NGUYỄN HUỆ</h1>
    <div class="sb">THPT Chuyên Nguyễn Huệ – Hà Tây · Khóa 2003–2006 · Thứ Bảy 08/08/2026</div>
  </div>

  <div class="cd" id="countdown"></div>

  <div id="app">
    <div class="loading"><div class="spin"></div><div style="margin-top:12px">Đang tải dữ liệu...</div></div>
  </div>

  <div class="ft">
    <div class="t1">20 Năm Trở Về – Thanh Xuân Vẫy Gọi</div>
    <div class="t2">THPT Chuyên Nguyễn Huệ – Hà Tây · Khóa 2003–2006</div>
  </div>
</div>

<script>
/* ================================================================
   SHEET ID đã điền sẵn. Yêu cầu Sheets: Share → Anyone with link → Viewer
   ================================================================ */
const SHEET_ID = '1JklOTleXY0LfVNKxfZ6pM7ljv9HDtOs-TfwHbmlkZwU';
const TABS = { cauHinh:'Cấu hình', dashboard:'DASHBOARD', dongGop:'Đóng góp', checklist:'Checklist', rsvp:'RSVP' };
const EVENT = new Date('2026-08-08T07:00:00+07:00');
const REFRESH_MS = 5 * 60 * 1000;
/* ================================================================ */

function csvUrl(tab) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}&headers=0&r=${Date.now()}`;
}

function parseCSV(text) {
  const rows = []; let cur = []; let field = ''; let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (inQ) {
      if (c === '"' && n === '"') { field += '"'; i++; }
      else if (c === '"') inQ = false;
      else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { cur.push(field); field = ''; }
      else if (c === '\n') { cur.push(field); rows.push(cur); cur = []; field = ''; }
      else if (c === '\r') {}
      else field += c;
    }
  }
  if (field !== '' || cur.length) { cur.push(field); rows.push(cur); }
  return rows;
}

function cell(rows, r, c) {
  if (!rows || r < 0 || r >= rows.length) return '';
  const row = rows[r];
  if (!row || c < 0 || c >= row.length) return '';
  return (row[c] || '').trim();
}

/* Parse số kiểu VN: "500.000.000"→500000000, "0,0%"→0 */
function num(s) {
  if (!s) return 0;
  s = String(s).trim();
  let clean = s.replace(/[^\d.,\-]/g, '');
  if (clean.includes('.') && clean.includes(',')) {
    clean = clean.replace(/\./g, '').replace(',', '.');
  } else if (clean.includes('.')) {
    const parts = clean.split('.');
    if (parts.length > 2 || (parts.length === 2 && parts[1].length === 3)) clean = clean.replace(/\./g, '');
  } else if (clean.includes(',')) {
    clean = clean.replace(',', '.');
  }
  return parseFloat(clean) || 0;
}

function fmt(n) { return Math.round(n || 0).toLocaleString('vi-VN'); }
function clean(s) { return (s && s.startsWith('(')) ? '' : s; }

async function fetchTab(tab) {
  try {
    const r = await fetch(csvUrl(tab));
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return parseCSV(await r.text());
  } catch(e) { console.warn(`Tab "${tab}":`, e.message); return null; }
}

async function loadAll() {
  const [ch, db, dg, cl, rsvp] = await Promise.all([
    fetchTab(TABS.cauHinh), fetchTab(TABS.dashboard),
    fetchTab(TABS.dongGop), fetchTab(TABS.checklist), fetchTab(TABS.rsvp)
  ]);

  if (!ch && !db) {
    document.getElementById('app').innerHTML = `<div class="err"><strong>Chưa kết nối được Google Sheets.</strong><br><br>Kiểm tra: trong Google Sheets nhấn <strong>Share → Anyone with the link → Viewer</strong>.<br><br><small>SHEET_ID: ${SHEET_ID}</small></div>`;
    return;
  }

  const d = {};

  // === CẤU HÌNH ===
  // row[4]: A="Tên chủ TK:" | B=giá trị | D="Ngân hàng:" | E=giá trị
  // row[5]: A="Số TK:" | B=giá trị | D="Chi nhánh:" | E=giá trị
  // row[6]: A="Nội dung CK:" | B=giá trị | D="Hotline:" | E=giá trị
  if (ch) {
    d.tkTen = clean(cell(ch,4,1));
    d.tkSo  = clean(cell(ch,5,1));
    d.tkND  = clean(cell(ch,6,1)) || 'HỌ TÊN – LỚP – HK20';
    d.tkNH  = clean(cell(ch,4,4));
    d.tkCN  = clean(cell(ch,5,4));
    d.tkHL  = clean(cell(ch,6,4));
    // BTC: row[11..14] - Họ tên(B=1), SĐT(D=3), Email(E=4)
    d.btc = [];
    const roles = ['Trưởng ban Tổ chức','Trưởng ban Liên lạc','Thủ quỹ','Trưởng ban Event'];
    for (let i = 0; i < 4; i++) {
      const r = 11 + i;
      d.btc.push({
        role: cell(ch,r,0) || roles[i],
        name: clean(cell(ch,r,1)),
        sdt: clean(cell(ch,r,3)),
        email: clean(cell(ch,r,4))
      });
    }
    d.mucTieu = num(cell(ch,17,1)) || 500000000;
    d.formLink = clean(cell(ch,28,1));
    d.dressCode = clean(cell(ch,29,1));
    d.guiXe = clean(cell(ch,30,1));
  } else { d.mucTieu = 500000000; d.btc = []; }

  // === DASHBOARD ===
  if (db) {
    d.daHuyDong = num(cell(db,5,1));
    d.daChi     = num(cell(db,6,1));
    d.soDu      = num(cell(db,7,1));
    d.soThayCo  = num(cell(db,10,1));
    d.soMTQ     = num(cell(db,11,1));
    if (!d.mucTieu) d.mucTieu = num(cell(db,4,1)) || 500000000;
  } else { d.daHuyDong=0;d.daChi=0;d.soDu=0;d.soThayCo=0;d.soMTQ=0; }

  // === RSVP: đếm "Sẽ tới?" = Có (cột index 6), bỏ header row[0] ===
  d.soDangKy = 0;
  if (rsvp && rsvp.length > 1) {
    for (let i = 1; i < rsvp.length; i++) {
      const ten = cell(rsvp,i,1);
      const seToi = cell(rsvp,i,6);
      if (ten && /^có$/i.test(seToi)) d.soDangKy++;
    }
  }

  // === ĐÓNG GÓP: row[4..] đến "TỔNG KHÓA" ===
  d.dongGop = [];
  if (dg) {
    for (let i = 4; i < dg.length; i++) {
      const lop = cell(dg,i,1);
      if (lop === 'TỔNG KHÓA') break;
      if (lop) d.dongGop.push({ lop, sn:num(cell(dg,i,2)), tt:num(cell(dg,i,3)), td:num(cell(dg,i,6)), mtq:num(cell(dg,i,5)) });
    }
  }

  // === CHECKLIST: row[4..], dừng ở dòng tổng ===
  d.checklist = [];
  if (cl) {
    for (let i = 4; i < cl.length; i++) {
      const a = cell(cl,i,0);
      const task = cell(cl,i,2);
      if (['Tổng:','Xong:','Đang làm:','Trễ:'].includes(a)) break;
      if (task) d.checklist.push({ nhom:cell(cl,i,1), task, owner:cell(cl,i,3), dl:cell(cl,i,4), st:cell(cl,i,5)||'Chưa làm' });
    }
  }
  d.clTong = d.checklist.length;
  d.clXong = d.checklist.filter(i => i.st === 'Xong').length;

  render(d);
}

function render(d) {
  const pct = d.mucTieu > 0 ? Math.round((d.daHuyDong/d.mucTieu)*100) : 0;
  const clP = d.clTong > 0 ? Math.round((d.clXong/d.clTong)*100) : 0;
  const diffD = Math.max(0, Math.floor((EVENT - new Date()) / 864e5));

  let extraLinks = '';
  if (d.formLink) extraLinks += `<a href="${d.formLink}" target="_blank" class="lk-fm">📝 Đăng ký</a>`;
  if (d.dressCode) extraLinks += `<span class="ip">👔 ${d.dressCode}</span>`;
  if (d.guiXe) extraLinks += `<span class="ip">🅿️ ${d.guiXe}</span>`;

  const bankRows = [
    `<div class="bk-r"><span class="bk-l">Chủ TK</span><span class="bk-v ${d.tkTen?'':'bk-empty'}">${d.tkTen || 'Đang cập nhật'}</span></div>`,
    `<div class="bk-r"><span class="bk-l">Số TK</span><span class="bk-v ${d.tkSo?'bk-n':'bk-empty'}">${d.tkSo || 'Đang cập nhật'}</span></div>`,
    `<div class="bk-r"><span class="bk-l">Ngân hàng</span><span class="bk-v ${d.tkNH?'':'bk-empty'}">${d.tkNH ? d.tkNH + (d.tkCN ? ' – '+d.tkCN : '') : 'Đang cập nhật'}</span></div>`,
    `<div class="bk-r"><span class="bk-l">Nội dung CK</span><span class="bk-v bk-n">${d.tkND}</span></div>`
  ];
  if (d.tkHL) bankRows.push(`<div class="bk-r"><span class="bk-l">Hotline</span><span class="bk-v">${d.tkHL}</span></div>`);
  const bankH = `<div class="bk"><div class="bk-t">💳 Đóng góp trực tiếp cho Hội khóa</div>${bankRows.join('')}</div>`;

  const btcH = '<div class="bg">' + d.btc.map(b => `
    <div class="bc"><div class="bc-r">${b.role}</div>
    ${b.name ? `<div class="bc-n">${b.name}</div>` : `<div class="bc-n-empty">Đang cập nhật</div>`}
    ${b.sdt ? `<div class="bc-i">📞 ${b.sdt}</div>` : ''}
    ${b.email ? `<div class="bc-i">✉️ ${b.email}</div>` : ''}</div>`).join('') + '</div>';

  let clH = '';
  if (d.checklist.length > 0) {
    const groups = {};
    d.checklist.forEach(i => { (groups[i.nhom] = groups[i.nhom] || []).push(i); });
    Object.entries(groups).forEach(([g, items]) => {
      const done = items.filter(i => i.st === 'Xong').length;
      clH += `<tr><td colspan="4" class="grp">${g} <span style="font-weight:400;font-size:11px;color:#666">(${done}/${items.length})</span></td></tr>`;
      items.forEach((item, idx) => {
        const bc = item.st==='Xong'?'b-xong':item.st==='Đang làm'?'b-dang':item.st==='Trễ'?'b-tre':'b-chua';
        clH += `<tr style="background:${idx%2===0?'#fff':'#fafaf5'}"><td>${item.task}</td><td style="text-align:center;color:#666">${item.owner}</td><td style="text-align:center;color:#666">${item.dl}</td><td style="text-align:center"><span class="badge ${bc}">${item.st}</span></td></tr>`;
      });
    });
  }

  const dgH = d.dongGop.map((i, idx) => `<tr style="background:${idx%2===0?'#fff':'#fafaf5'}"><td style="font-weight:600">${i.lop}</td><td style="text-align:right">${fmt(i.sn)}</td><td style="text-align:right;font-weight:600">${fmt(i.tt)}đ</td><td style="text-align:right">${fmt(i.td)}</td><td style="text-align:right">${fmt(i.mtq)}</td></tr>`).join('');

  const timeStr = new Date().toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'});

  document.getElementById('app').innerHTML = `
    <div class="lks">
      <a href="https://www.facebook.com/groups/2199210970835888" target="_blank" class="lk-fb">📘 Group Facebook</a>
      <a href="https://drive.google.com/drive/u/0/folders/1SM3cPp8FiJg0z2Mm0_o8XDbBaxu1-QtW" target="_blank" class="lk-dr">📁 Drive chung</a>
      ${extraLinks}
    </div>
    <div class="sts">
      <div class="st"><div class="v">${diffD}</div><div class="lb">ngày còn lại</div></div>
      <div class="st"><div class="v" style="color:${pct>50?'var(--green)':'var(--gold)'}">${fmt(d.daHuyDong)}</div><div class="lb">đã huy động (đ)</div></div>
      <div class="st"><div class="v">${d.soDangKy}</div><div class="lb">đăng ký tham dự</div></div>
      <div class="st"><div class="v">${d.soThayCo}</div><div class="lb">thầy cô xác nhận</div></div>
      <div class="st"><div class="v">${clP}%</div><div class="lb">checklist</div></div>
      <div class="st"><div class="v">${d.soMTQ}</div><div class="lb">mạnh thường quân</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--goldbg);margin-top:8px"><span>Quỹ: ${fmt(d.daHuyDong)}đ</span><span>Mục tiêu: ${fmt(d.mucTieu)}đ</span></div>
    <div class="gg"><div class="gf" style="width:${Math.max(pct,2)}%;background:linear-gradient(90deg,var(--green),var(--gold))">${pct}%</div></div>
    ${bankH}
    <div class="sc"><h2>👥 Ban Tổ Chức</h2></div>
    ${btcH}
    <div class="tabs">
      <button class="tab active" onclick="stab('cl',this)">📋 Checklist</button>
      <button class="tab" onclick="stab('dg',this)">💰 Đóng góp</button>
      <button class="tab" onclick="stab('ns',this)">📊 Ngân sách</button>
    </div>
    <div id="t-cl" class="tc active">
      <div class="sc"><h2>📋 Checklist chuẩn bị (${d.clXong}/${d.clTong})</h2></div>
      <div style="overflow-x:auto"><table class="tb"><tr><th>Công việc</th><th style="width:100px">Owner</th><th style="width:70px">Deadline</th><th style="width:80px">Trạng thái</th></tr>${clH || '<tr><td colspan="4" style="text-align:center;color:#999;padding:20px">Đang cập nhật...</td></tr>'}</table></div>
    </div>
    <div id="t-dg" class="tc">
      <div class="sc"><h2>💰 Đóng góp theo lớp</h2></div>
      <div style="overflow-x:auto"><table class="tb"><tr><th>Lớp</th><th style="text-align:right">Người</th><th style="text-align:right">Tổng tiền</th><th style="text-align:right">Tham dự</th><th style="text-align:right">MTQ</th></tr>${dgH || '<tr><td colspan="5" style="text-align:center;color:#999;padding:20px">Chưa có dữ liệu</td></tr>'}</table></div>
    </div>
    <div id="t-ns" class="tc">
      <div class="sc"><h2>📊 Tổng quan ngân sách</h2></div>
      <div style="overflow-x:auto"><table class="tb"><tr><th>Hạng mục</th><th style="text-align:right;width:160px">Giá trị</th></tr>
        <tr><td>Mục tiêu quỹ</td><td style="text-align:right;font-weight:700">${fmt(d.mucTieu)}đ</td></tr>
        <tr style="background:#fafaf5"><td>Đã huy động</td><td style="text-align:right;font-weight:700;color:var(--green)">${fmt(d.daHuyDong)}đ</td></tr>
        <tr><td>Đã chi</td><td style="text-align:right;color:var(--red)">${fmt(d.daChi)}đ</td></tr>
        <tr style="background:#fafaf5"><td>Số dư hiện tại</td><td style="text-align:right;font-weight:700">${fmt(d.soDu)}đ</td></tr>
        <tr style="background:var(--goldbg)"><td style="font-weight:700;color:var(--navy)">Tỷ lệ đạt mục tiêu</td><td style="text-align:right;font-weight:700;font-size:18px;color:var(--navy)">${pct}%</td></tr>
      </table></div>
    </div>
    <div class="refresh">Cập nhật lúc ${timeStr} · Tự động refresh mỗi 5 phút</div>`;
}

function stab(id, el) {
  document.querySelectorAll('.tc').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
  document.getElementById('t-'+id).classList.add('active');
  el.classList.add('active');
}

function countdown() {
  const dd = EVENT - new Date();
  if (dd < 0) { document.getElementById('countdown').innerHTML='<div style="color:var(--gold);font-size:18px;font-weight:700">🎉 Hội khóa đã diễn ra!</div>'; return; }
  const D=Math.floor(dd/864e5), H=Math.floor(dd%864e5/36e5), M=Math.floor(dd%36e5/6e4), S=Math.floor(dd%6e4/1e3);
  document.getElementById('countdown').innerHTML = [['NGÀY',D],['GIỜ',H],['PHÚT',M],['GIÂY',S]].map(([l,v]) => `<div class="cb"><div class="n">${String(v).padStart(2,'0')}</div><div class="l">${l}</div></div>`).join('');
}
countdown(); setInterval(countdown, 1000);
loadAll(); setInterval(loadAll, REFRESH_MS);
</script>
</body>
</html>
